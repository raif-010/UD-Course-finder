name: Build APK (Auto Capacitor)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Create Capacitor project
        run: |
          npx cap init "UD Course Finder" "com.ud.coursefinder" --web-dir=dist
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
